<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Animation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            font-family: Arial, sans-serif;
        }

        .logo-container {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            z-index: 2;
            position: relative;
        }

        .logo-container:hover {
            transform: scale(1.1);
        }

        .logo-container img {
            width: 200px;
            height: auto;
        }

        .welcome-text {
            margin-top: 20px;
            font-size: 24px;
            color: #fff;
        }

        video {
            display: none;
            width: 100%;
            height: auto;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background-color: #000;
        }
    </style>
</head>
<body>

    <div class="logo-container" id="logoContainer">
        <img src="https://github.com/etherneomdc3-IT/RAW/blob/main/wireless-wallet.png?raw=true" alt="Welcome Logo">
        <div class="welcome-text">Click the Logo to Start</div>
    </div>

    <video id="welcomeVideo" src="logo.mp4" type="video/mp4"></video>

    <script>
        const logoContainer = document.getElementById('logoContainer');
        const video = document.getElementById('welcomeVideo');

        logoContainer.addEventListener('click', () => {
            // Hide logo
            logoContainer.style.display = 'none';
            
            // Show video and play
            video.style.display = 'block';
            video.play();

            // Redirect after video ends
            video.addEventListener('ended', () => {
                window.location.href = "https://www.example.com"; // Replace with your URL
            });
        });
    </script>

</body>
</html>
