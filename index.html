<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: black;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.logo-container {
    text-align: center;
    cursor: pointer;
    transition: opacity 0.4s ease;
}

.logo-container img {
    width: 200px;
}

.welcome-text {
    color: white;
    margin-top: 15px;
    font-size: 22px;
}

video {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#skipButton {
    display: none;
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 8px 15px;
    font-size: 14px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="logo-container" id="logoContainer">
    <img src="https://github.com/etherneomdc3-IT/RAW/blob/main/wireless-wallet.png?raw=true">
    <div class="welcome-text">Click Logo to Start</div>
</div>

<video id="welcomeVideo">
    <source src="logo.mp4" type="video/mp4">
</video>

<button id="skipButton">Skip</button>

<script>
const logo = document.getElementById("logoContainer");
const video = document.getElementById("welcomeVideo");
const skip = document.getElementById("skipButton");

// redirect function
function goHome() {
    window.location.href = "hero.html";
}

// when logo clicked
logo.addEventListener("click", function() {

    logo.style.opacity = "0";

    setTimeout(() => {
        logo.style.display = "none";
        video.style.display = "block";
        skip.style.display = "block";
        video.play();
    }, 400);

});

// auto redirect when video ends
video.onended = goHome;

// skip button
skip.onclick = goHome;
</script>

</body>
</html>
