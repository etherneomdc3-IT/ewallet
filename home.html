<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wireless Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .phone-frame {
            max-width: 380px;
            height: 680px;
            background: #000;
            border-radius: 28px;           /* softer corners, no thick phone look */
            box-shadow: none;              /* PHONE BORDER REMOVED */
            overflow: hidden;
            position: relative;
        }
        
        .pin-row {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .pin-row.shake {
            animation: shake 420ms cubic-bezier(.36,.07,.19,.97) both;
        }
        
        @keyframes shake {
            10%, 90% { transform: translate3d(-3px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
        
        .key-btn {
            width: 68px;
            height: 68px;
            background: #18181b;
            color: white;
            font-size: 28px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            transition: all 0.15s cubic-bezier(0.4, 0.0, 0.2, 1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .key-btn:active {
            transform: scale(0.92);
            background: #27272a;
        }
        
        .fingerprint-container {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .fingerprint-container.scanning {
            animation: glowPulse 1.8s infinite ease-in-out;
        }
        
        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 12px #67e8f9); }
            50% { filter: drop-shadow(0 0 28px #22d3ee); }
        }
        
        .scan-line {
            position: absolute;
            left: 12%;
            width: 76%;
            height: 5px;
            background: linear-gradient(90deg, 
                transparent 0%,
                #67e8f9 40%,
                #c084fc 60%,
                transparent 100%);
            box-shadow: 0 0 18px #67e8f9,
                        0 0 35px #22d3ee;
            border-radius: 9999px;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }
        
        .fingerprint-container.scanning .scan-line {
            animation: fingerprintScan 3000ms linear forwards;
            opacity: 1;
        }
        
        @keyframes fingerprintScan {
            0% { top: -30%; opacity: 0.4; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { top: 130%; opacity: 0; }
        }
        
        .success .fingerprint-container {
            filter: hue-rotate(80deg) brightness(1.15);
        }
    </style>
</head>
<body class="bg-zinc-950 flex items-center justify-center min-h-screen p-4">
    <div class="phone-frame mx-auto">
        <!-- top status bar simulation -->
        <div class="h-11 bg-black flex items-end justify-center">
            <div class="w-36 h-1 bg-zinc-700 rounded-full mb-2"></div>
        </div>
        
        <div class="flex flex-col h-[calc(100%-44px)] pt-8 px-8">
            <!-- Logo PNG -->
            <div class="flex flex-col items-center">
                <div class="w-32 h-32 bg-gradient-to-br from-slate-900 to-black rounded-full flex items-center justify-center shadow-inner overflow-hidden">
                    <img src="https://png.pngtree.com/png-vector/20230408/ourmid/pngtree-wifi-symbol-gradient-color-icon-png-image_6680004.png" 
                         alt="Wireless Wallet Logo" 
                         class="w-28 h-28 object-contain drop-shadow-lg">
                </div>
                <h1 class="text-3xl font-semibold tracking-[-1px] mt-5 text-white">Wireless Wallet</h1>
            </div>
            
            <!-- PIN dots -->
            <div id="pin-dots" class="pin-row flex justify-center gap-5 mt-10">
                <div id="dot1" class="w-[18px] h-[18px] border-2 border-slate-500 rounded-full"></div>
                <div id="dot2" class="w-[18px] h-[18px] border-2 border-slate-500 rounded-full"></div>
                <div id="dot3" class="w-[18px] h-[18px] border-2 border-slate-500 rounded-full"></div>
                <div id="dot4" class="w-[18px] h-[18px] border-2 border-slate-500 rounded-full"></div>
                <div id="dot5" class="w-[18px] h-[18px] border-2 border-slate-500 rounded-full"></div>
                <div id="dot6" class="w-[18px] h-[18px] border-2 border-slate-500 rounded-full"></div>
            </div>
            
            <!-- Keypad -->
            <div class="mt-12 grid grid-cols-3 gap-6">
                <button onclick="pressKey(1)" class="key-btn">1</button>
                <button onclick="pressKey(2)" class="key-btn">2</button>
                <button onclick="pressKey(3)" class="key-btn">3</button>
                
                <button onclick="pressKey(4)" class="key-btn">4</button>
                <button onclick="pressKey(5)" class="key-btn">5</button>
                <button onclick="pressKey(6)" class="key-btn">6</button>
                
                <button onclick="pressKey(7)" class="key-btn">7</button>
                <button onclick="pressKey(8)" class="key-btn">8</button>
                <button onclick="pressKey(9)" class="key-btn">9</button>
                
                <button onclick="backspace()" class="key-btn text-4xl text-zinc-400">×</button>
                <button onclick="pressKey(0)" class="key-btn">0</button>
                <button onclick="submitPin()" class="key-btn text-4xl text-emerald-400">✓</button>
            </div>
            
            <!-- Fingerprint scanner -->
            <div class="mt-auto mb-8 flex flex-col items-center">
                <div id="fp-container" onclick="startScan()" 
                     class="fingerprint-container relative w-28 h-28 cursor-pointer select-none">
                    <img id="fp-img" 
                         src="https://www.pngall.com/wp-content/uploads/5/Fingerprint-PNG-Image.png" 
                         alt="Fingerprint"
                         class="w-28 h-28 drop-shadow-[0_10px_20px_rgba(103,232,249,0.3)]">
                    <div class="scan-line"></div>
                </div>
                
                <p id="fp-status" 
                   class="mt-4 text-sm font-medium tracking-[0.5px] text-zinc-400 transition-all">
                    Touch to Login
                </p>
            </div>
        </div>
    </div>
    
    <script>
        const correctPin = "888967";
        let currentPin = '';
        const maxLength = 6;
        let isScanning = false;
        
        function updateDots() {
            for (let i = 1; i <= maxLength; i++) {
                const dot = document.getElementById(`dot${i}`);
                if (i <= currentPin.length) {
                    dot.classList.add('bg-white', 'border-white', 'shadow-[0_0_8px_rgb(255,255,255)]');
                } else {
                    dot.classList.remove('bg-white', 'border-white', 'shadow-[0_0_8px_rgb(255,255,255)]');
                }
            }
        }
        
        function pressKey(num) {
            if (currentPin.length < maxLength) {
                currentPin += num;
                updateDots();
            }
        }
        
        function backspace() {
            if (currentPin.length > 0) {
                currentPin = currentPin.slice(0, -1);
                updateDots();
            }
        }
        
        function showError() {
            const pinRow = document.getElementById('pin-dots');
            const status = document.getElementById('fp-status');
            
            pinRow.classList.add('shake');
            status.textContent = 'Incorrect PIN';
            status.classList.add('text-red-500', 'font-semibold');
            
            setTimeout(() => {
                currentPin = '';
                updateDots();
                status.textContent = 'Touch to Login';
                status.classList.remove('text-red-500', 'font-semibold');
                pinRow.classList.remove('shake');
            }, 1600);
        }
        
        function submitPin() {
            if (currentPin.length === maxLength) {
                if (currentPin === correctPin) {
                    const status = document.getElementById('fp-status');
                    status.innerHTML = 'PIN Verified <span class="text-emerald-400">✓</span>';
                    
                    setTimeout(() => {
                        window.location.href = 'Home.html';
                    }, 800);
                } else {
                    showError();
                }
            }
        }
        
        function startScan() {
            if (isScanning) return;
            isScanning = true;
            
            const container = document.getElementById('fp-container');
            const status = document.getElementById('fp-status');
            
            container.classList.add('scanning');
            status.textContent = 'Scanning...';
            status.classList.add('text-cyan-400');
            
            setTimeout(() => {
                container.classList.remove('scanning');
                container.classList.add('success');
                
                status.innerHTML = 'Login Successful <span class="text-emerald-400 text-lg">✓</span>';
                status.classList.remove('text-cyan-400');
                status.classList.add('text-emerald-400', 'font-semibold');
                
                setTimeout(() => {
                    window.location.href = 'Home.html';
                }, 900);
            }, 3000);
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key >= '0' && e.key <= '9') pressKey(parseInt(e.key));
            else if (e.key === 'Backspace') backspace();
            else if (e.key === 'Enter') submitPin();
        });
        
        window.onload = function() {
            updateDots();
        };
    </script>
</body>
</html>
